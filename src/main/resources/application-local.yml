spring:
  config:
    activate:
      on-profile: local
  datasource:
    # Spring Boot running on your host -> use mapped host port 5111 from docker-compose.yml
    url: jdbc:postgresql://localhost:5111/sentinelai
    username: sentinel
    password: sentinel_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3
      embedding:
        model: llama3

logging:
  level:
    root: INFO
    '[com.sentinel.ai]': DEBUG


# Custom application properties
sentinelai:
  jira:
    base-url: http://localhost:8081 # Change to your Jira instance URL
    username: <jira-username>
    api-token: <jira-api-token>

---
# AWS profile example (not active by default)
spring:
  config:
    activate:
      on-profile: aws
  datasource:
    url: jdbc:postgresql://<aws-rds-endpoint>:5432/sentinelai
    username: <aws-username>
    password: <aws-password>
  ai:
    ollama:
      base-url: <aws-ollama-endpoint>
      model: llama3
